    title: "Emmanuel Jr. D. Gigantone"
    subtitle: |
      Hi! I’m Emman, part data and tech in passion, part economics in training. I work with both hats to realize them as social tools in analysis and applied work. I also major in development economics and have been involved in spaces across the social sciences, technology, and civic initiatives.

      I enjoy working on social data science projects, which often involve social protection, informal work, political economy, digital transformation, AI, and data governance. My current work brings these together by studying poverty targeting tools in the Pantawid Pamilyang Pilipino Program (4Ps), focusing on exclusion and inclusion error patterns and their geographic distribution. 

      I'll be using this space to document my learnings, projects, and progress along the way!
