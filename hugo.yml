    title: "Emmanuel Jr. D. Gigantone"
    subtitle: "Hi! I’m Emman, part data and tech in passion, part economics in training. I also major in development economics and have been involved in spaces across the social sciences, technology, and civic initiatives."
    subtitle: "I really enjoy working on social data science projects and these often involve social protection, informal work, political economy, digital transformation, AI, and data governance. My current work brings these together by studying poverty targeting tools in the Pantawid Pamilyang Pilipino Program (4Ps), focusing on exclusion and inclusion error patterns and its geographic distribution."
    subtitle: "I'll be using this space to document my learnings, projects, and progress along the way!" 
